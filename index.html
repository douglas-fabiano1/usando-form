<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de cor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <main>
        <form name="form-cadastro" id="form-cadastro" method="post" action="endereco-da-aplicacao">
            <fieldset class="dados-usuario">
                <legend>Escolha a cor de fundo</legend>
                <section class="form-campos">
                    <div>
                        <label for="cor">Clique para selecionar a cor:</label>
                        <input type="color" name="cor" id="cor" value="#14badb">
                    </div>
                </section>
            </fieldset>
            <div class="btn-container">
                <button type="submit" id="aplicar-cor" name="aplicar-cor" class="btn">
                    Aplicar a cor
                </button>
            </div>
        </form>
    </main>
</body>

</html>

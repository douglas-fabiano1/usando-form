<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campos para datas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <main>
        <form name="form-cadastro" id="form-cadastro" method="get" action="">
            <fieldset class="dados-usuario">
                <legend>Campos para datas</legend>
                <section class="form-campos">
                    <div class="span-2">
                        <label for="data">Data</label>
                        <input type="date" name="data" id="data" required>
                    </div>
                    <div>
                        <label for="hora">Hora</label>
                        <input type="time" name="hora" id="hora" required>
                    </div>
                    <div>
                        <label for="data-hora">Data/Hora</label>
                        <input type="datetime-local" name="data-hora" id="data-hora" required>
                    </div>
                    <div>
                        <label for="semana">Semana</label>
                        <input type="week" name="semana" id="semana" required>
                    </div>
                    <div>
                        <label for="mes">Mês</label>
                        <input type="month" name="mes" id="mes" required>
                    </div>
                </section>
                <div class="btn-container">
                    <button type="submit" id="datas" name="datas" class="btn">Salvar datas</button>
                </div>
            </fieldset>
        </form>
    </main>
</body>

</html>
